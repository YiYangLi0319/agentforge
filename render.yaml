# Render 一键蓝图（Blueprint）。在 Render 控制台 New + > Blueprint 选中本仓库即可。
# 使用 Render 托管 PostgreSQL（含 pgvector），数据持久化、重新部署不丢失。
databases:
  - name: agentforge-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: agentforge
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AGENTFORGE_ENV
        value: prod
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_API_KEY
        sync: false # 在 Render 面板手动填入你的 DeepSeek Key
      - key: LLM_MODEL
        value: deepseek-chat
      - key: EMBEDDING_PROVIDER
        value: mock
      - key: SEARCH_PROVIDER
        value: auto
      # 由上面的托管 PostgreSQL 自动注入（连接串会被应用规范化为 asyncpg 驱动）
      - key: DATABASE_URL
        fromDatabase:
          name: agentforge-db
          property: connectionString
      # 可选：管理员用户名 / 注册邀请码 / 每日额度
      - key: ADMIN_USERNAME
        sync: false
      - key: REGISTRATION_INVITE_CODE
        sync: false
      - key: DAILY_TOKEN_QUOTA
        value: "200000"
