services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentforge-postgres
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
      POSTGRES_DB: agentforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: agentforge-backend
    env_file:
      - path: .env
        required: false  # 未创建 .env 时以 Mock 模式启动
    environment:
      DATABASE_URL: postgresql+asyncpg://agentforge:agentforge@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/data

  frontend:
    build: ./frontend
    container_name: agentforge-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
