name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agentforge tests

      - name: Type check (mypy)
        run: mypy agentforge

      - name: Tests (pytest, 全离线 Mock 模式)
        run: pytest tests -q --cov=agentforge --cov-report=term-missing:skip-covered

      - name: Offline eval pipeline smoke
        run: python -m agentforge.evals.runner retrieval
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./ci_eval.db"

  frontend:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
